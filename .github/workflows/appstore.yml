name: Build & Upload to App Store

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.1)'
        required: false

jobs:
  build-and-upload:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # App Store now requires iOS 26 SDK — prefer Xcode 26
          if [ -d /Applications/Xcode_26.0.app ]; then
            XCODE_PATH=/Applications/Xcode_26.0.app
          elif [ -d /Applications/Xcode_26_beta.app ]; then
            XCODE_PATH=/Applications/Xcode_26_beta.app
          elif ls /Applications/Xcode_26*.app 2>/dev/null | head -1 | grep -q Xcode; then
            XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | head -1)
          else
            XCODE_PATH=/Applications/Xcode_16.3.app
            echo "WARNING: Xcode 26 not found, falling back to Xcode 16.3"
          fi
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          sudo xcodebuild -license accept 2>/dev/null || true
          sudo xcodebuild -runFirstLaunch 2>&1 || true
          sudo xcodebuild -downloadPlatform iOS 2>&1 || echo "Platform download: already installed or skipped"

      - name: Install Apple certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app.keychain-db
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" -A \
            -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Set version
        if: github.event.inputs.version != ''
        run: |
          agvtool new-marketing-version ${{ github.event.inputs.version }}

      - name: Archive
        run: |
          COMMON_ARGS=(
            -project WebRtcPhoneDialer-iOS.xcodeproj
            -scheme WebRtcPhoneDialer-iOS
            -configuration Release
            -sdk iphoneos
            -archivePath "$RUNNER_TEMP/WebRtcPhoneDialer.xcarchive"
            CODE_SIGN_STYLE=Manual
            "CODE_SIGN_IDENTITY=iPhone Distribution"
            DEVELOPMENT_TEAM=YHHD7MGNB5
            "PROVISIONING_PROFILE_SPECIFIER=${{ secrets.PROVISIONING_PROFILE_NAME }}"
            ASSETCATALOG_COMPILER_OPTIMIZATION=nothing
          )
          # Try with destination specifier (requires iOS platform installed)
          xcodebuild archive "${COMMON_ARGS[@]}" -destination 'generic/platform=iOS' \
            || xcodebuild archive "${COMMON_ARGS[@]}"

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>iPhone Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.webrtcphonedialer.ios</key>
              <string>${{ secrets.PROVISIONING_PROFILE_NAME }}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/WebRtcPhoneDialer.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to App Store Connect
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$ASC_API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/WebRtcPhoneDialer-iOS.ipa" \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID" \
            --verbose 2>&1
